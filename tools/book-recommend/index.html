<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="../../assets/favicon/favicon.ico" type="image/x-icon" />
    <link rel="icon" href="../../assets/favicon/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="../../assets/favicon/apple-touch-icon.png" />
  <meta name="theme-color" content="#24b5a7" />
    <title>선정도서 추천하기 – 송도 독서 포레스트</title>
    <style>
        :root {
            --primary: #2e5c4d;
            --primary-light: #4a8270;
            --primary-dark: #1a3c34;
            --text-main: #1c2b26;
            --text-muted: #5e736a;
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(255, 255, 255, 0.5);
            --glass-shadow: 0 16px 40px rgba(18, 38, 30, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
            color: var(--text-main);
            background:
                radial-gradient(circle at 15% 10%, #d5e8df 0%, transparent 400px),
                radial-gradient(circle at 85% 90%, #d8e5df 0%, transparent 350px),
                linear-gradient(135deg, #ebf4f0 0%, #ffffff 50%, #e2ede7 100%);
            background-attachment: fixed;
            overflow-x: hidden;
        }

        .bg-shape {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.45;
            animation: float 20s ease-in-out infinite alternate;
        }

        .shape-1 {
            width: 400px;
            height: 400px;
            background: #b6d9c8;
            top: -100px;
            right: -50px;
        }

        .shape-2 {
            width: 500px;
            height: 500px;
            background: #cce0d6;
            bottom: -150px;
            left: -100px;
            animation-delay: -5s;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(-30px, 40px) scale(1.1);
            }
        }

        .wrap {
            width: min(720px, 92vw);
            margin: 0 auto;
            padding: 48px 0 80px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .ani {
            animation: fadeInUp 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
        }

        .d1 {
            animation-delay: 0.05s;
        }

        .d2 {
            animation-delay: 0.15s;
        }

        .d3 {
            animation-delay: 0.25s;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--primary);
            font-weight: 600;
            font-size: 0.9rem;
            text-decoration: none;
            opacity: 0.8;
            transition: opacity 0.2s;
        }

        .back-link:hover {
            opacity: 1;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 32px 36px;
            box-shadow: var(--glass-shadow);
            position: relative;
            overflow: hidden;
        }

        .hero-slot {
            position: relative;
        }

        .card.hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transform: skewX(-20deg);
            animation: shimmer 6s infinite;
        }

        @keyframes shimmer {
            0% {
                left: -100%;
            }

            20% {
                left: 200%;
            }

            100% {
                left: 200%;
            }
        }

        .card.hero h1 {
            font-size: clamp(1.4rem, 2.5vw, 1.9rem);
            font-weight: 800;
            color: var(--primary-dark);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card.hero p {
            margin-top: 8px;
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        /* Step badge */
        .step-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }

        .step-badge {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            font-size: 0.78rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .step-title {
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--primary-dark);
        }

        /* Form */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-muted);
        }

        .form-group input,
        .form-group textarea,
        .form-group input[type="date"] {
            width: 100%;
            padding: 13px 16px;
            border: 1.5px solid rgba(46, 92, 77, 0.18);
            border-radius: 12px;
            font-size: 0.975rem;
            font-family: inherit;
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.8);
            outline: none;
            transition: border-color 0.25s, box-shadow 0.25s;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 110px;
            line-height: 1.65;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group input[type="date"]:focus {
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(74, 130, 112, 0.12);
        }

        .form-group input[type="date"] {
            cursor: pointer;
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: #aabdb6;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        /* Inline search row */
        .search-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .search-row .form-group {
            flex: 1;
        }

        .btn-search {
            flex-shrink: 0;
            height: 48px;
            padding: 0 18px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-search:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .btn-search:disabled {
            opacity: 0.55;
            cursor: not-allowed;
            transform: none;
        }

        /* Search status */
        .search-status {
            margin-top: 8px;
            font-size: 0.85rem;
            display: none;
        }

        .search-status.info {
            color: var(--text-muted);
            display: block;
        }

        .search-status.found {
            color: #2e7d32;
            display: block;
        }

        .search-status.miss {
            color: #b45309;
            display: block;
        }

        /* Description hint */
        .desc-hint {
            font-size: 0.82rem;
            color: var(--text-muted);
            margin-top: 6px;
            line-height: 1.5;
        }

        .desc-hint a {
            color: var(--primary);
            font-weight: 600;
        }

        /* Divider */
        .divider {
            height: 1px;
            background: rgba(46, 92, 77, 0.08);
            margin: 4px 0;
        }

        .gap {
            margin-top: 14px;
        }

        /* Generate button */
        .btn-generate {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(46, 92, 77, 0.25);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 6px;
        }

        .btn-generate:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(46, 92, 77, 0.35);
        }

        .btn-generate:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-generate:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .spinner {
            width: 17px;
            height: 17px;
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Result */
        .result-card {
            display: none;
        }

        .result-card.visible {
            display: block;
        }

        .result-label {
            font-size: 0.82rem;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .result-preview {
            margin-top: 16px;
            background: rgba(46, 92, 77, 0.04);
            border-left: 3px solid var(--primary-light);
            border-radius: 0 12px 12px 0;
            padding: 18px 20px;
            font-size: 1rem;
            line-height: 1.95;
            word-break: keep-all;
            color: var(--text-main);
        }

        .result-preview .ai-highlight {
            color: var(--primary);
            font-weight: 600;
        }

        .btn-copy {
            margin-top: 18px;
            display: inline-flex;
            align-items: center;
            gap: 7px;
            background: transparent;
            border: 1.5px solid rgba(46, 92, 77, 0.25);
            border-radius: 999px;
            padding: 9px 20px;
            font-size: 0.9rem;
            font-weight: 700;
            font-family: inherit;
            color: var(--primary);
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .btn-copy:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .btn-copy.copied {
            background: #34a853;
            color: white;
            border-color: #34a853;
        }

        .error-msg {
            display: none;
            color: #c0392b;
            font-size: 0.9rem;
            background: rgba(192, 57, 43, 0.06);
            border: 1px solid rgba(192, 57, 43, 0.15);
            border-radius: 10px;
            padding: 11px 15px;
            margin-top: 10px;
        }

        .error-msg.visible {
            display: block;
        }

        /* 책 표지 이미지 */
        .book-cover-wrap {
            display: none;
            align-items: flex-start;
            gap: 18px;
            margin-bottom: 14px;
            padding: 14px 16px;
            background: rgba(46, 92, 77, 0.04);
            border: 1px solid rgba(46, 92, 77, 0.1);
            border-radius: 14px;
            animation: fadeInUp 0.4s ease forwards;
        }

        .book-cover-wrap.visible {
            display: flex;
        }

        .book-cover-img {
            width: 80px;
            min-width: 80px;
            border-radius: 6px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.15);
            object-fit: cover;
        }

        .book-cover-info {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .book-cover-title {
            font-weight: 800;
            font-size: 0.98rem;
            color: var(--primary-dark);
            line-height: 1.4;
        }

        .book-cover-author {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .book-cover-publisher {
            font-size: 0.82rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* API 키 설정 카드 */
        .key-card {
            border: 1.5px dashed rgba(46, 92, 77, 0.25);
        }

        .key-card.missing {
            border-color: #e67e22;
            background: rgba(230, 126, 34, 0.04);
        }

        .key-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            user-select: none;
        }

        .key-header-left {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--primary-dark);
        }

        .key-status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ccc;
            flex-shrink: 0;
        }

        .key-status-dot.ok {
            background: #34a853;
        }

        .key-status-dot.warn {
            background: #e67e22;
        }

        .key-toggle-arrow {
            font-size: 0.8rem;
            color: var(--text-muted);
            transition: transform 0.2s;
        }

        .key-toggle-arrow.open {
            transform: rotate(180deg);
        }

        .key-body {
            display: none;
            margin-top: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .key-body.collapsed {
            display: none;
        }

        .key-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .key-label {
            font-size: 0.82rem;
            font-weight: 700;
            color: var(--text-muted);
            min-width: 5em;
        }

        .key-input {
            flex: 1;
            padding: 10px 13px;
            border: 1.5px solid rgba(46, 92, 77, 0.18);
            border-radius: 10px;
            font-size: 0.88rem;
            font-family: monospace;
            background: rgba(255, 255, 255, 0.85);
            color: var(--text-main);
            outline: none;
            transition: border-color 0.2s;
        }

        .key-input:focus {
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(74, 130, 112, 0.1);
        }

        .btn-key-save {
            flex-shrink: 0;
            padding: 9px 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-key-save:hover {
            background: var(--primary-dark);
        }

        .key-note {
            font-size: 0.8rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .key-note a {
            color: var(--primary);
            font-weight: 600;
        }

        @media (max-width: 520px) {
            .card {
                padding: 24px 20px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .wrap {
                padding: 30px 0 60px;
            }

            .search-row {
                flex-direction: column;
                align-items: stretch;
                gap: 12px;
            }

            .btn-search {
                width: 100%;
                height: 46px;
                justify-content: center;
            }

            .search-row .form-group {
                width: 100%;
                align-items: stretch;
            }

            .search-row .form-group label {
                width: 100%;
                text-align: left;
                padding-left: 2px;
            }
        }
        .wrap {
            width: min(760px, calc(100vw - 36px));
            padding: 22px 0 48px;
            gap: 16px;
        }

        .back-link {
            width: fit-content;
            padding: 10px 16px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(180, 216, 208, 0.56);
            box-shadow: 0 10px 24px rgba(31, 94, 85, 0.08);
            font-weight: 700;
        }

        .card {
            background: rgba(255, 255, 255, 0.82);
            border-color: rgba(180, 216, 208, 0.56);
            box-shadow: 0 18px 42px rgba(31, 94, 85, 0.11);
            border-radius: 28px;
        }

        .card.hero h1 {
            background: linear-gradient(90deg, #1f7468, #177f86, #2b85b9);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.04em;
        }

        .card.hero {
            display: flex;
            align-items: center;
            gap: 18px;
            padding: 28px 30px;
        }

        .hero-mark {
            position: relative;
            width: 62px;
            height: 62px;
            border-radius: 20px;
            flex: 0 0 auto;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, #42c48f, #24b5a7 54%, #57b7e5);
            box-shadow: 0 18px 30px rgba(46, 145, 132, 0.22);
        }

        .hero-mark::after {
            content: "";
            position: absolute;
            top: -1px;
            right: -1px;
            width: 16px;
            height: 16px;
            border: 3px solid #fff;
            border-radius: 50%;
            background: linear-gradient(135deg, #5fb8ff, #8ce8ff);
        }

        .hero-mark svg {
            width: 28px;
            height: 28px;
            color: #fff;
            stroke-width: 2.1;
        }

        .hero-copy p {
            margin-top: 8px;
        }

        .step-badge,
        .btn-search,
        .btn-generate,
        .btn-key-save {
            background: linear-gradient(90deg, #42c48f, #24b5a7);
            border-color: transparent;
            box-shadow: 0 12px 26px rgba(39, 185, 138, 0.18);
        }

        .btn-search:hover,
        .btn-generate:hover,
        .btn-key-save:hover {
            background: linear-gradient(90deg, #24b5a7, #177f86);
        }

        .btn-copy:hover {
            background: linear-gradient(90deg, #2e5c4d, #177f86);
            color: white;
            border-color: transparent;
        }

        @media (max-width: 520px) {
            :root {
                --mobile-sticky-gap: 14px;
            }

            .hero-slot {
                position: sticky;
                top: 0;
                z-index: 10;
                padding-top: var(--mobile-sticky-gap);
                overflow: clip;
                transition: height 300ms ease;
            }

            .hero-slot.collapsed {
                height: 112px;
            }

            .hero-slot.collapsed::before {
                content: "";
                position: absolute;
                inset: 0 0 auto;
                height: calc(var(--mobile-sticky-gap) + 10px);
                background:
                    radial-gradient(circle at 15% 10%, #d5e8df 0%, transparent 400px),
                    radial-gradient(circle at 85% 90%, #d8e5df 0%, transparent 350px),
                    linear-gradient(135deg, #ebf4f0 0%, #ffffff 50%, #e2ede7 100%);
                pointer-events: none;
            }

            .hero-slot.collapsed::after {
                content: "";
                position: absolute;
                left: 0;
                right: 0;
                bottom: 0;
                height: 24px;
                background: linear-gradient(180deg, rgba(226, 237, 231, 0.88) 0%, rgba(226, 237, 231, 0) 100%);
                pointer-events: none;
            }

            .wrap {
                width: min(calc(100vw - 20px), 760px);
                padding: 14px 0 30px;
                gap: 12px;
            }

            .card {
                padding: 22px 16px;
                border-radius: 22px;
            }

            .card.hero {
                position: relative;
                flex-direction: row;
                text-align: left;
                align-items: center;
                gap: 16px;
                padding: 20px 16px;
                transition: padding 300ms ease, gap 300ms ease, border-radius 300ms ease;
            }

            .back-link {
                width: 100%;
                justify-content: center;
            }

            .hero-mark {
                transition: width 300ms ease, height 300ms ease, opacity 300ms ease, margin 300ms ease;
                overflow: hidden;
            }

            .hero-copy p {
                margin-top: 6px;
                font-size: 0.92rem;
                transition: font-size 300ms ease, margin 300ms ease, opacity 300ms ease;
            }

            .card.hero.collapsed {
                padding: 14px 16px 12px;
                gap: 0;
                border-radius: 22px;
            }

            .card.hero.collapsed .hero-mark {
                width: 0;
                height: 0;
                opacity: 0;
                margin: 0;
            }

            .card.hero.collapsed .hero-copy p {
                margin-top: 2px;
                font-size: 0.82rem;
            }
        }
    </style>
</head>

<body>
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <div class="wrap">

        <!-- Back -->
        <a class="back-link ani d1" href="../../index.html">← 홈으로</a>

        <!-- API 키 설정 -->
        <div class="card key-card ani d1" id="key-card" style="display:none">
            <div class="key-header" onclick="toggleKeyPanel()">
                <div class="key-header-left">
                    <div class="key-status-dot" id="key-dot"></div>
                    <span id="key-header-text">게미나이/OpenAI API 키</span>
                </div>
                <span class="key-toggle-arrow" id="key-arrow">▼</span>
            </div>
            <div class="key-body collapsed" id="key-body">
                <div class="key-row">
                    <span class="key-label">Gemini</span>
                    <input class="key-input" id="input-gemini-key" type="password" placeholder="AIza..."
                        autocomplete="off" />
                    <button class="btn-key-save" onclick="saveKeys()">저장</button>
                </div>
                <div class="key-row">
                    <span class="key-label">OpenAI</span>
                    <input class="key-input" id="input-openai-key" type="password" placeholder="sk-proj-... (선택)"
                        autocomplete="off" />
                </div>
                <p class="key-note">
                    키는 브라우저에만 저장되며, 코드/GitHub에 절대 저장되지 않습니다.<br>
                    • Gemini: <a href="https://aistudio.google.com/app/apikey" target="_blank">AI Studio</a><br>
                    • OpenAI: <a href="https://platform.openai.com/api-keys" target="_blank">platform.openai.com</a>
                </p>
            </div>
        </div>

        <!-- Hero -->
        <div class="hero-slot">
        <div class="card hero ani d1">
            <div class="hero-mark" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none">
                    <path d="M4.5 5.5A2.5 2.5 0 0 1 7 3h12.5v16H7a2.5 2.5 0 0 0-2.5 2.5z" stroke="currentColor"

    <script>
        // ─── Gemini: Netlify Function 엔드포인트 (키는 서버에만 존재) ───
        const FUNCTION_URL = '/.netlify/functions/book-recommend';

        // OpenAI 폴백 (Netlify Function 실패 시 localStorage 키로 클라이언트 직호출)
        const OPENAI_URL = 'https://api.openai.com/v1/chat/completions';

        // 검색된 도서의 ISBN/링크 (알라딘 링크 생성에 활용)
        let currentIsbn = '';
        let currentBookLink = '';
        function resetSelectedBookState() {
            currentIsbn = '';
            currentBookLink = '';
            hideCover();
        }

        /* ─── 날짜 초기값: 오늘 기준 다음주 토요일 ───────── */
        (function () {
            const today = new Date();
            const nextSaturday = new Date(today);
            const dayOfWeek = today.getDay();
            const daysUntilNextWeekSaturday = ((6 - dayOfWeek + 7) % 7) + 7;
            nextSaturday.setDate(today.getDate() + daysUntilNextWeekSaturday);

            const yyyy = nextSaturday.getFullYear();
            const mm = String(nextSaturday.getMonth() + 1).padStart(2, '0');
            const dd = String(nextSaturday.getDate()).padStart(2, '0');
            document.getElementById('pick-date').value = `${yyyy}-${mm}-${dd}`;
        })();

        /* ─── 교보문고 / 알라딘 검색 링크 동적 업데이트 ────────────────── */
        function updateBookLinks() {
            const titleRaw = document.getElementById('book-title').value.trim();
            const q = encodeURIComponent(titleRaw);
            const kyobo = document.getElementById('link-kyobo');
            const aladin = document.getElementById('link-aladin');
            if (titleRaw) {
                kyobo.href = `https://search.kyobobook.co.kr/search?keyword=${q}`;
                aladin.href = `https://www.aladin.co.kr/search/wsearchresult.aspx?SearchTarget=Book&SearchWord=${q}`;
            } else {
                kyobo.href = 'https://www.kyobobook.co.kr';
                aladin.href = 'https://www.aladin.co.kr';
            }
        }
        document.getElementById('book-title').addEventListener('input', () => {
            resetSelectedBookState();
            updateBookLinks();
        });
        document.getElementById('book-author').addEventListener('input', resetSelectedBookState);

        /* ─── 제목/저자 정규화 ────────────────────── */
        function normalizeTitle(s) {
            return (s || '').toLowerCase()
                .replace(/\([^)]*\)/g, '')
                .replace(/[\s\-·:,\.。、！!?？\[\]"'“”‘’]/g, '')
                .normalize('NFC');
        }

        function normalizeAuthorName(s) {
            return (s || '').toLowerCase()
                .replace(/\([^)]*\)/g, '')
                .replace(/지음|저자|글|그림|엮음|옮김|감수|원작|저|역/g, '')
                .replace(/[\s\-·:,\.\/。、！!?？\[\]"'“”‘’]/g, '')
                .normalize('NFC');
        }

        /* ─── 한국어 포함 비율 계산 ────────────────────────── */
        function koreanRatio(text) {
            if (!text) return 0;
            const korean = (text.match(/[가-힣]/g) || []).length;
            const total = text.replace(/\s/g, '').length;
            return total === 0 ? 0 : korean / total;
        }

        function getPublishedYear(value) {
            const match = String(value || '').match(/\d{4}/);
            return match ? match[0] : '';
        }

        function getGoogleInfo(item) {
            return item?.volumeInfo || {};
        }

        function getGoogleTitle(item) {
            return getGoogleInfo(item).title || '';
        }

        function getGoogleAuthors(item) {
            return getGoogleInfo(item).authors || [];
        }

        function htmlToPlainText(value) {
            if (!value) return '';
            const temp = document.createElement('textarea');
            temp.innerHTML = String(value)
                .replace(/<br\s*\/?>/gi, '\n')
                .replace(/<[^>]+>/g, ' ');
            return temp.value.replace(/\s+/g, ' ').trim();
        }

        function getGooglePrimaryDescription(item) {
            return getGoogleInfo(item).description || '';
        }

        function getGoogleSnippet(item) {
            return htmlToPlainText(item?.searchInfo?.textSnippet || '');
        }

        function getGoogleDescription(item) {
            return getGooglePrimaryDescription(item) || getGoogleSnippet(item) || '';
        }

        function getGoogleCover(item) {
            const info = getGoogleInfo(item);
            return info.imageLinks?.thumbnail || info.imageLinks?.smallThumbnail || '';
        }

        function getGoogleIdentifiers(item) {
            return getGoogleInfo(item).industryIdentifiers || [];
        }

        function getGoogleIsbn(item) {
            const identifiers = getGoogleIdentifiers(item);
            return identifiers.find(x => x.type === 'ISBN_13')?.identifier ||
                identifiers.find(x => x.type === 'ISBN_10')?.identifier || '';
        }

        function isGooglePhysicalBook(item) {
            return !item?.saleInfo?.isEbook;
        }

        function getTitleMatchScore(candidateTitle, searchTitle) {
            const target = normalizeTitle(searchTitle);
            const candidate = normalizeTitle(candidateTitle);
            if (!target || !candidate) return 0;
            if (candidate === target) return 120;
            if (candidate.includes(target) || target.includes(candidate)) return 80;
            const targetTokens = new Set((searchTitle || '').toLowerCase().split(/\s+/).filter(Boolean));
            const candidateTokens = (candidateTitle || '').toLowerCase().split(/\s+/).filter(Boolean);
            let overlap = 0;
            for (const token of candidateTokens) {
                if (targetTokens.has(token)) overlap += 1;
            }
            return overlap > 0 ? 40 + overlap * 10 : 0;
        }

        function getAuthorMatchScore(candidateAuthors, searchAuthor) {
            if (!searchAuthor) return 15;
            const target = normalizeAuthorName(searchAuthor);
            if (!target) return 15;
            const authors = (candidateAuthors || []).map(author => normalizeAuthorName(author)).filter(Boolean);
            if (authors.length === 0) return -15;
            if (authors.some(author => author === target)) return 60;
            if (authors.some(author => author.includes(target) || target.includes(author))) return 35;
            return -20;
        }

        function getGoogleWorkScore(item, searchTitle, searchAuthor) {
            const info = getGoogleInfo(item);
            let score = 0;
            score += getTitleMatchScore(info.title, searchTitle);
            score += getAuthorMatchScore(info.authors, searchAuthor);
            if (info.language === 'ko') score += 12;
            else if (info.language && info.language !== 'ko') score -= 40;
            if (isGooglePhysicalBook(item)) score += 18;
            else score -= 30;
            if (info.publisher) score += 6;
            return score;
        }

        function buildWorkCandidates(items, searchTitle, searchAuthor) {
            const scored = (items || []).map(item => ({
                item,
                score: getGoogleWorkScore(item, searchTitle, searchAuthor)
            })).filter(entry => entry.score > 0)
                .sort((a, b) => b.score - a.score);

            if (scored.length === 0) return [];

            const topScore = scored[0].score;
            return scored
                .filter(entry => entry.score >= Math.max(45, topScore - 35))
                .map(entry => entry.item);
        }

        function getGoogleRepresentativeScore(item, searchTitle, searchAuthor) {
            const info = getGoogleInfo(item);
            const publishedYear = Number.parseInt(getPublishedYear(info.publishedDate), 10) || 0;
            let score = getGoogleWorkScore(item, searchTitle, searchAuthor);
            if (isGooglePhysicalBook(item)) score += 25;
            if (getGoogleIdentifiers(item).some(x => x.type === 'ISBN_13')) score += 18;
            else if (getGoogleIsbn(item)) score += 10;
            if (getGoogleCover(item)) score += 14;
            if (info.publisher) score += 8;
            if (info.pageCount > 0) score += 6;
            if (publishedYear > 0) score += Math.min(12, Math.max(0, publishedYear - 1990) / 3);
            return score;
        }

        function chooseGoogleRepresentative(candidates, searchTitle, searchAuthor) {
            if (!candidates || candidates.length === 0) return null;
            return [...candidates].sort((a, b) =>
                getGoogleRepresentativeScore(b, searchTitle, searchAuthor) -
                getGoogleRepresentativeScore(a, searchTitle, searchAuthor)
            )[0] || null;
        }

        function getDescriptionScore(item, searchTitle, searchAuthor) {
            const primaryDesc = getGooglePrimaryDescription(item);
            const snippet = getGoogleSnippet(item);
            const desc = primaryDesc || snippet;
            if (!desc) return -Infinity;
            let score = getGoogleWorkScore(item, searchTitle, searchAuthor);
            const ratio = koreanRatio(desc);
            score += primaryDesc ? 45 : -45;
            score += ratio >= 0.5 ? 30 : ratio >= 0.15 ? 8 : -80;
            if (primaryDesc) {
                if (desc.length >= 80 && desc.length <= 900) score += 18;
                else if (desc.length > 900) score += 12;
                else if (desc.length >= 40) score += 6;
            } else if (desc.length >= 40) {
                score -= 10;
            }
            return score;
        }

        function selectBestDescription(candidates, searchTitle, searchAuthor) {
            const viable = (candidates || []).filter(item => getGoogleDescription(item));
            if (viable.length === 0) return null;
            return [...viable].sort((a, b) =>
                getDescriptionScore(b, searchTitle, searchAuthor) -
                getDescriptionScore(a, searchTitle, searchAuthor)
            )[0] || null;
        }

        function selectBestGoogleCover(candidates, searchTitle, searchAuthor) {
            const viable = (candidates || []).filter(item => getGoogleCover(item));
            if (viable.length === 0) return null;
            return [...viable].sort((a, b) =>
                getGoogleRepresentativeScore(b, searchTitle, searchAuthor) -
                getGoogleRepresentativeScore(a, searchTitle, searchAuthor)
            )[0] || null;
        }

        function isAladinEbook(item) {
            const category = String(item?.categoryName || '').toLowerCase();
            const mallType = String(item?.mallType || '').toLowerCase();
            return category.includes('ebook') || category.includes('전자책') || mallType.includes('ebook');
        }

        function getAladinMatchScore(item, searchTitle, searchAuthor) {
            if (!item) return -Infinity;
            let score = 0;
            score += getTitleMatchScore(item.title, searchTitle);
            score += getAuthorMatchScore([item.author], searchAuthor);
            if (!isAladinEbook(item)) score += 30;
            else score -= 40;
            if (item.isbn13) score += 14;
            else if (item.isbn) score += 8;
            if (item.cover) score += 12;
            if (item.publisher) score += 6;
            if (item.customerReviewRank > 0) score += Math.min(item.customerReviewRank / 2, 10);
            if (item.salesPoint > 0) score += Math.min(item.salesPoint / 500, 10);
            return score;
        }

        function chooseAladinRepresentative(items, searchTitle, searchAuthor) {
            const viable = (items || []).filter(item => getAladinMatchScore(item, searchTitle, searchAuthor) > 40);
            if (viable.length === 0) return null;
            return [...viable].sort((a, b) =>
                getAladinMatchScore(b, searchTitle, searchAuthor) -
                getAladinMatchScore(a, searchTitle, searchAuthor)
            )[0] || null;
        }

        function buildAladinSearchUrl(title) {
            return `https://www.aladin.co.kr/search/wsearchresult.aspx?SearchTarget=Book&SearchWord=${encodeURIComponent(title)}`;
        }

        function mergeBookData(candidates, googleItems, aladinItems, fallbackTitle, fallbackAuthor) {
            const googleRepresentative = chooseGoogleRepresentative(candidates, fallbackTitle, fallbackAuthor);
            const descriptionSource = selectBestDescription(
                (googleItems && googleItems.length > 0) ? googleItems : candidates,
                fallbackTitle,
                fallbackAuthor
            );
            const coverSource = selectBestGoogleCover(candidates, fallbackTitle, fallbackAuthor) || googleRepresentative;
            const aladinRepresentative = chooseAladinRepresentative(aladinItems, fallbackTitle, fallbackAuthor);
            const baseGoogleInfo = getGoogleInfo(googleRepresentative || descriptionSource || coverSource);
            const googleDescription = getGoogleDescription(descriptionSource);
            const googleHasPrimaryDescription = !!getGooglePrimaryDescription(descriptionSource);
            const aladinDescription = aladinRepresentative?.description || '';
            const shouldPreferAladinDescription =
                !!aladinDescription &&
                (!googleDescription || !googleHasPrimaryDescription || koreanRatio(googleDescription) < 0.25);
            const description = shouldPreferAladinDescription
                ? aladinDescription
                : (googleDescription || aladinDescription || '');

            const title = aladinRepresentative?.title || baseGoogleInfo.title || fallbackTitle;
            const author = aladinRepresentative?.author || (baseGoogleInfo.authors || []).join(', ') || fallbackAuthor;
            const publisher = aladinRepresentative?.publisher || baseGoogleInfo.publisher || '';
            const publishedYear = getPublishedYear(aladinRepresentative?.pubDate || baseGoogleInfo.publishedDate);
            const isbn = aladinRepresentative?.isbn13 || aladinRepresentative?.isbn || getGoogleIsbn(googleRepresentative) || getGoogleIsbn(descriptionSource) || '';
            const coverUrl = aladinRepresentative?.cover || getGoogleCover(coverSource) || '';
            const link = aladinRepresentative?.link ||
                (isbn ? `https://www.aladin.co.kr/shop/wproduct.aspx?ISBN=${isbn}` : buildAladinSearchUrl(title || fallbackTitle));

            return {
                title,
                author,
                publisher,
                publishedYear,
                description,
                isbn,
                coverUrl,
                link,
                source: {
                    representative: aladinRepresentative ? 'aladin' : 'google',
                    description: shouldPreferAladinDescription
                        ? 'aladin'
                        : (googleDescription ? 'google' : (aladinDescription ? 'aladin' : 'none'))
                }
            };
        }

        function normalizeCoverUrl(url) {
            if (!url) return '';
            const httpsUrl = url.replace('http://', 'https://');
            return httpsUrl.includes('books.google') ? upgradeImageUrl(httpsUrl) : httpsUrl;
        }

        /* ─── Google Books + 알라딘 하이브리드 검색 ──────────────────────────── */
        async function searchBook() {
            const title = document.getElementById('book-title').value.trim();
            const author = document.getElementById('book-author').value.trim();
            const btn = document.getElementById('btn-search');

            if (!title) {
                setStatus('info', '📌 책 제목을 먼저 입력해 주세요.');
                return;
            }

            btn.disabled = true;
            btn.textContent = '검색 중…';
            resetSelectedBookState();
            setStatus('info', '🔍 Google Books와 알라딘에서 도서를 검색 중입니다…');

            const q = `intitle:${title}${author ? '+inauthor:' + author : ''}`;
            try {
                const res = await fetch(FUNCTION_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'search', q, title, author })
                });
                const data = await res.json().catch(() => ({}));

                if (!res.ok) {
                    currentIsbn = '';
                    currentBookLink = '';
                    setStatus('miss', `⚠️ 검색 오류: ${data?.error || res.status}. 아래에 직접 붙여넣어 주세요.`);
                    hideCover();
                    return;
                }

                const googleItems = Array.isArray(data?.items) ? data.items : [];
                const aladinItems = Array.isArray(data?.aladin?.items) ? data.aladin.items : [];
                const workCandidates = buildWorkCandidates(googleItems, title, author);
                const merged = mergeBookData(
                    workCandidates.length > 0 ? workCandidates : googleItems,
                    googleItems,
                    aladinItems,
                    title,
                    author
                );

                console.debug('[book-recommend] merged search result', {
                    query: { title, author, q },
                    googleItems: googleItems.length,
                    aladinItems: aladinItems.length,
                    aladinError: data?.aladin?.error || '',
                    merged
                });

                if (!merged.title && !merged.description) {
                    currentIsbn = '';
                    currentBookLink = '';
                    setStatus('miss', '⚠️ 검색 결과가 없습니다. 아래에 도서 소개를 직접 붙여넣어 주세요.');
                    hideCover();
                    return;
                }

                currentIsbn = merged.isbn || '';
                currentBookLink = merged.link || buildAladinSearchUrl(merged.title || title);

                if (merged.coverUrl) {
                    showCover(
                        normalizeCoverUrl(merged.coverUrl),
                        merged.title || title,
                        merged.author || author,
                        merged.publisher,
                        merged.publishedYear
                    );
                } else {
                    hideCover();
                }

                updateBookLinks();

                if (merged.description) {
                    document.getElementById('book-desc').value = merged.description;
                    const repSourceText = merged.source.representative === 'aladin'
                        ? '알라딘 대표 판본 기준으로 정리했습니다.'
                        : 'Google Books 기준으로 정리했습니다.';
                    setStatus('found', `✅ "${merged.title || title}" 도서 정보를 불러왔습니다. ${repSourceText}`);
                } else {
                    console.warn('[book-recommend] description missing after merge', {
                        query: { title, author, q },
                        googleItems,
                        aladinItems,
                        merged
                    });
                    document.getElementById('book-desc').value = '';
                    setStatus('miss', '⚠️ 도서는 찾았지만 소개글이 없습니다. 아래에 직접 붙여넣어 주세요.');
                }
            } catch (e) {
                currentIsbn = '';
                currentBookLink = '';
                setStatus('miss', '⚠️ 검색 중 오류가 발생했습니다. 직접 붙여넣어 주세요.');
            } finally {
                btn.disabled = false;
                btn.textContent = '🔍 도서 검색';
            }
        }
        function setStatus(type, msg) {
            const el = document.getElementById('search-status');
            el.className = 'search-status ' + type;
            el.textContent = msg;
        }

        // Google Books URL을 고해상도로 업그레이드
        function upgradeImageUrl(url) {
            let u = url.replace('http://', 'https://');
            u = u.replace(/&edge=curl/g, '');   // 말린 효과 제거
            u = u.replace(/zoom=\d+/, 'zoom=0'); // 최대 해상도
            return u;
        }

        function showCover(src, title, author, publisher, year) {
            document.getElementById('book-cover-img').src = src;
            document.getElementById('book-cover-img').alt = title + ' 표지';
            // zoom=0이 막힌 경우 thumbnail(zoom=1)로 폴백
            document.getElementById('book-cover-img').onerror = function () {
                this.onerror = null;
                this.src = src.replace('zoom=0', 'zoom=1');
            };
            document.getElementById('book-cover-title').textContent = title;
            document.getElementById('book-cover-author').textContent = author;
            document.getElementById('book-cover-publisher').textContent =
                [publisher, year].filter(Boolean).join(' · ');
            document.getElementById('book-cover-wrap').classList.add('visible');
        }

        function hideCover() {
            document.getElementById('book-cover-wrap').classList.remove('visible');
        }

        /* ─── Gemini 추천글 생성 ─────────────────────────── */
        async function generate() {
            const title = document.getElementById('book-title').value.trim();
            const author = document.getElementById('book-author').value.trim();
            const desc = document.getElementById('book-desc').value.trim();
            const dateVal = document.getElementById('pick-date').value;
            const errorEl = document.getElementById('error-msg');
            const resultCard = document.getElementById('result-card');

            // 날짜 파싱
            const [, month, day] = dateVal ? dateVal.split('-') : ['', '', ''];
            const parsedMonth = parseInt(month, 10);
            const parsedDay = parseInt(day, 10);

            errorEl.classList.remove('visible');
            errorEl.textContent = '';

            if (!dateVal) return showError('📌 날짜를 선택해 주세요.');
            if (!title) return showError('📌 책 제목을 입력해 주세요.');
            if (!author) return showError('📌 저자 이름을 입력해 주세요.');
            if (!desc) return showError('📌 도서 소개를 입력하거나 검색으로 불러와 주세요.');

            setLoading(true);
            resultCard.classList.remove('visible');

            // 도서 소개가 너무 길면 앞 500자만 사용 (출력 토큰 확보)
            const descTrimmed = desc.length > 500 ? desc.slice(0, 500) + '…' : desc;

            const prompt =
                `아래 도서 소개를 바탕으로 독서모임 공지용 추천 본문을 작성해줘.

도서 소개:
"""
${descTrimmed}
"""

조건:
- 정확히 2문장으로 작성
- 100자 이내로 작성할 것 (초과 금지)
- 쉼표(,)와 접속어(~하며, ~하고, ~속에서)를 최소화해 단문으로 작성
- 자연스럽게 마무리될 것 (중간에 끊기는 느낌 금지)
- 줄바꿈 없이 한 문단으로 작성
- 도서 소개의 실제 내용을 바탕으로 쓸 것 (내용 창작 금지)
- 책 제목과 저자 이름은 언급하지 말 것 (앞에서 이미 소개됨)
- 따뜻하고 진지한 독서모임 톤
- 앞뒤 인사말·설명·따옴표 없이 본문만 출력`;

            try {
                let aiBody = null;
                let usedModel = '';

                // ① Netlify Function을 통해 Gemini 호출 (키는 서버에 숨겨져 있음)
                document.getElementById('btn-text').textContent = 'Gemini 분석 중…';
                let fnRes;
                try {
                    fnRes = await fetch(FUNCTION_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ prompt })
                    });
                } catch (netErr) {
                    fnRes = null; // 네트워크 오류 → OpenAI 폴백으로
                }

                if (fnRes && fnRes.ok) {
                    const fnData = await fnRes.json().catch(() => ({}));
                    const text = (fnData?.text || '').trim();
                    if (text) {
                        aiBody = text;
                        usedModel = fnData?.model || 'Gemini';
                    }
                } else if (fnRes) {
                    // Function 자체 오류 (환경변수 누락 등)
                    const fnErr = await fnRes.json().catch(() => ({}));
                    const msg = fnErr?.error || '';
                    // 할당량 초과가 아닌 서버 오류면 바로 알림
                    if (fnRes.status !== 429 && fnRes.status !== 502 && fnRes.status !== 503) {
                        throw new Error(`서버 오류: ${msg || fnRes.status}`);
                    }
                    // 429/502/503 → OpenAI 폴백 시도
                }

                // ② Gemini 실패 시 → 사용자가 저장한 OpenAI 키로 폴백
                if (!aiBody) {
                    const OPENAI_API_KEY = getOpenAIKey();
                    if (!OPENAI_API_KEY) {
                        throw new Error('Gemini 서버 응답이 없습니다. 위 설정에서 OpenAI API 키를 등록하거나 잠시 후 다시 시도해 주세요.');
                    }
                    document.getElementById('btn-text').textContent = 'ChatGPT로 재시도 중…';

                    const oRes = await fetch(OPENAI_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${OPENAI_API_KEY}`
                        },
                        body: JSON.stringify({
                            model: 'gpt-4o-mini',
                            messages: [{ role: 'user', content: prompt }],
                            temperature: 0.7,
                            max_tokens: 400
                        })
                    });

                    if (!oRes.ok) {
                        const e = await oRes.json().catch(() => ({}));
                        throw new Error('OpenAI 오류: ' + (e?.error?.message || oRes.status));
                    }
                    const oData = await oRes.json();
                    aiBody = oData?.choices?.[0]?.message?.content?.trim();
                    usedModel = 'ChatGPT (gpt-4o-mini)';
                    if (!aiBody) throw new Error('OpenAI 응답이 비어있습니다.');
                }

                if (!aiBody) throw new Error('응답이 비어있습니다. 다시 시도해 주세요.');

                renderResult(parsedMonth, parsedDay, title, author, aiBody, usedModel);

            } catch (err) {
                showError('❌ ' + err.message);
            } finally {
                setLoading(false);
            }
        }

        /* ─── 결과 렌더링 ────────────────────────────────── */
        function renderResult(month, day, title, author, aiBody, usedModel = 'Gemini') {
            // 사용 모델 표시
            const labelEl = document.getElementById('result-label');
            if (usedModel === 'Gemini') {
                labelEl.innerHTML = '✅ 생성된 추천글 <span style="font-size:0.78rem;font-weight:500;opacity:0.7;margin-left:6px;">✦ Gemini</span>';
            } else {
                labelEl.innerHTML = '✅ 생성된 추천글 <span style="font-size:0.78rem;font-weight:500;color:#10a37f;margin-left:6px;">✦ ' + usedModel + ' (Gemini 한도 초과로 전환)</span>';
            }
            const aladinUrl = currentBookLink ||
                (currentIsbn
                    ? `https://www.aladin.co.kr/shop/wproduct.aspx?ISBN=${currentIsbn}`
                    : `https://www.aladin.co.kr/search/wsearchresult.aspx?SearchTarget=Book&SearchWord=${encodeURIComponent(title)}`);

            const plain =
                `여러분 안녕하세요,
${month}월 ${day}일 지정 도서 📖 ${title} - ${author} 안내드립니다.

${aiBody}

해당 도서에 관심 있으신 회원분들은 소모임 앱의 게시판에 댓글 참여 부탁드립니다🤗
[도서 정보] ${aladinUrl}`;

            const preview = document.getElementById('result-preview');
            preview.dataset.plainText = plain;
            preview.innerHTML =
                `여러분 안녕하세요,<br>
${month}월 ${day}일 지정 도서 📖 <strong>${esc(title)}</strong> - ${esc(author)} 안내드립니다.<br><br>
<span class="ai-highlight">${esc(aiBody)}</span><br><br>
해당 도서에 관심 있으신 회원분들은 소모임 앱의 게시판에 댓글 참여 부탁드립니다🤗<br>
[도서 정보] <a href="${esc(aladinUrl)}" target="_blank" style="color:var(--primary);font-size:0.88rem;word-break:break-all;">${esc(aladinUrl)}</a>`;

            const btn = document.getElementById('btn-copy');
            btn.textContent = '📋 텍스트 복사';
            btn.classList.remove('copied');

            const card = document.getElementById('result-card');
            card.classList.add('visible');
            card.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function esc(s) {
            return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        /* ─── 표지 다운로드 ───────────────────────────────── */
        async function downloadCover() {
            const imgEl = document.getElementById('book-cover-img');
            const wrap = document.getElementById('book-cover-wrap');
            if (!imgEl || !wrap.classList.contains('visible') || !imgEl.src) {
                alert('다운로드할 표지 이미지가 없습니다.');
                return;
            }
            try {
                const src = imgEl.src;
                const res = await fetch(src);
                if (!res.ok) throw new Error('Fetch failed');
                const blob = await res.blob();
                const blobUrl = URL.createObjectURL(blob);
                const title = document.getElementById('book-cover-title').textContent.trim() || 'book_cover';
                const safeTitle = title.replace(/[\/\\?%*:|"<>]/g, '-');
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = safeTitle + '_표지.jpg';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(blobUrl);
            } catch (e) {
                // CORS 등으로 fetch 실패 시 새 창에서 열기
                window.open(imgEl.src, '_blank');
            }
        }

        /* ─── 카카오톡 공유 ───────────────────────────────── */
        async function shareKakao() {
            const el = document.getElementById('result-preview');
            const text = el.dataset.plainText || el.innerText;
            const btn = document.getElementById('btn-kakao');

            // ① Web Share API (삼성 인터넷 · 크롬 모바일 · 사파리 지원)
            //    OS 공유 시트가 열려 카카오톡으로 바로 전달 가능
            if (navigator.share) {
                try {
                    await navigator.share({ text });
                } catch (e) {
                    // 사용자가 공유 시트를 닫은 경우 등 → 아무 동작 안 함
                }
                return;
            }

            // ② 폴백: 클립보드 복사 후 안내 (Web Share API 미지원 환경)
            try {
                await navigator.clipboard.writeText(text);
            } catch {
                const ta = document.createElement('textarea');
                ta.value = text; document.body.appendChild(ta);
                ta.select(); document.execCommand('copy');
                document.body.removeChild(ta);
            }

            const origStyle = btn.getAttribute('style');
            btn.textContent = '✅ 복사 완료! 카카오톡에 붙여넣으세요';
            btn.style.cssText = 'margin-top:0; background:#34a853; color:white; border-color:#34a853;';
            setTimeout(() => {
                btn.textContent = '💬 카카오톡에 공유';
                btn.setAttribute('style', origStyle);
            }, 3000);
        }

        /* ─── 복사 ───────────────────────────────────────── */
        async function copyText() {
            const el = document.getElementById('result-preview');
            const text = el.dataset.plainText || el.innerText;
            const btn = document.getElementById('btn-copy');

            const done = () => {
                btn.textContent = '✅ 복사 완료!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = '📋 텍스트 복사';
                    btn.classList.remove('copied');
                }, 2500);
            };
            try {
                await navigator.clipboard.writeText(text); done();
            } catch {
                const ta = document.createElement('textarea');
                ta.value = text; document.body.appendChild(ta);
                ta.select(); document.execCommand('copy');
                document.body.removeChild(ta); done();
            }
        }

        /* ─── 유틸 ───────────────────────────────────────── */
        function setLoading(on) {
            document.getElementById('btn-gen').disabled = on;
            document.getElementById('spinner').style.display = on ? 'block' : 'none';
            document.getElementById('btn-text').textContent = on ? 'AI가 글을 쓰는 중…' : '✨ 추천글 생성하기';
        }
        function showError(msg) {
            const el = document.getElementById('error-msg');
            el.textContent = msg;
            el.classList.add('visible');
        }

        /* ─── localStorage API 키 관리 ───────────────────── */
        function getGeminiKey() {
            return localStorage.getItem('songfore_gemini_key') || '';
        }
        function getOpenAIKey() {
            return localStorage.getItem('songfore_openai_key') || '';
        }
        function saveKeys() {
            const gKey = document.getElementById('input-gemini-key').value.trim();
            const oKey = document.getElementById('input-openai-key').value.trim();
            if (gKey) localStorage.setItem('songfore_gemini_key', gKey);
            else localStorage.removeItem('songfore_gemini_key');
            if (oKey) localStorage.setItem('songfore_openai_key', oKey);
            else localStorage.removeItem('songfore_openai_key');
            updateKeyStatus();
            // 저장 후 패널 닫기
            document.getElementById('key-body').classList.add('collapsed');
            document.getElementById('key-arrow').classList.remove('open');
        }
        function toggleKeyPanel() {
            const body = document.getElementById('key-body');
            const arrow = document.getElementById('key-arrow');
            body.classList.toggle('collapsed');
            arrow.classList.toggle('open');
        }
        function updateKeyStatus() {
            const dot = document.getElementById('key-dot');
            const card = document.getElementById('key-card');
            const headerText = document.getElementById('key-header-text');
            // Netlify Function이 있으므로 Gemini 키 없어도 기본 동작함
            // OpenAI 키가 있으면 폴백 가능
            const hasOpenAI = !!getOpenAIKey();
            // 서버 키가 있다고 가정; 상태 표시는 OpenAI 폴백 여부로
            dot.className = 'key-status-dot ok';
            card.classList.remove('missing');
            headerText.textContent = hasOpenAI
                ? 'API 설정 (Gemini 서버 + OpenAI 폴백 ✓)'
                : 'API 설정 (Gemini 서버 운영 중)';
        }
        function initKeys() {
            // 저장된 키를 입력창에 마스킹해서 표시
            const gKey = getGeminiKey();
            const oKey = getOpenAIKey();
            if (gKey) document.getElementById('input-gemini-key').value = gKey;
            if (oKey) document.getElementById('input-openai-key').value = oKey;
            updateKeyStatus();
        }
        initKeys();

        document.getElementById('book-title').addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                e.preventDefault();
                searchBook();
            }
        });
        document.getElementById('book-author').addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                e.preventDefault();
                searchBook();
            }
        });
        document.getElementById('input-gemini-key').addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                e.preventDefault();
                saveKeys();
            }
        });
        document.getElementById('input-openai-key').addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                e.preventDefault();
                saveKeys();
            }
        });
    </script>
</body>
