<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="../../assets/favicon/favicon.ico" type="image/x-icon" />
  <link rel="icon" href="../../assets/favicon/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="../../assets/favicon/apple-touch-icon.png" />
  <meta name="theme-color" content="#24b5a7" />
  <title>책 표지 16:9 만들기 - 송도 독서 포레스트</title>
  <style>
    :root {
      --primary: #2e5c4d;
      --primary-light: #4a8270;
      --primary-dark: #1a3c34;
      --text-main: #1c2b26;
      --text-muted: #5e736a;
      --glass-bg: rgba(255, 255, 255, 0.7);
      --glass-border: rgba(255, 255, 255, 0.56);
      --glass-shadow: 0 20px 50px rgba(18, 38, 30, 0.1);
      --line-soft: rgba(46, 92, 77, 0.14);
      --accent-soft: rgba(74, 130, 112, 0.12);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at 12% 16%, #d5e8df 0%, transparent 420px),
        radial-gradient(circle at 88% 84%, #d8e5df 0%, transparent 360px),
        linear-gradient(135deg, #ebf4f0 0%, #ffffff 48%, #e2ede7 100%);
      background-attachment: fixed;
      overflow-x: hidden;
    }

    .bg-shape {
      position: fixed;
      border-radius: 50%;
      filter: blur(86px);
      z-index: -1;
      opacity: 0.42;
      animation: float 18s ease-in-out infinite alternate;
    }

    .shape-1 {
      width: 420px;
      height: 420px;
      background: #b6d9c8;
      top: -130px;
      right: -70px;
    }

    .shape-2 {
      width: 520px;
      height: 520px;
      background: #cce0d6;
      bottom: -180px;
      left: -120px;
      animation-delay: -4s;
    }

    @keyframes float {
      0% {
        transform: translate(0, 0) scale(1);
      }

      100% {
        transform: translate(-28px, 34px) scale(1.08);
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes shimmer {
      0% {
        left: -110%;
      }

      22% {
        left: 200%;
      }

      100% {
        left: 200%;
      }
    }

    .wrap {
      width: min(1220px, calc(100vw - 36px));
      margin: 0 auto;
      padding: 42px 0 72px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .ani {
      animation: fadeInUp 0.66s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      opacity: 0;
    }

    .d1 {
      animation-delay: 0.04s;
    }

    .d2 {
      animation-delay: 0.14s;
    }

    .d3 {
      animation-delay: 0.24s;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--primary);
      font-weight: 600;
      font-size: 0.92rem;
      text-decoration: none;
      opacity: 0.84;
      transition: opacity 0.2s;
    }

    .back-link:hover {
      opacity: 1;
    }

    .card {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 28px;
      padding: 30px 32px;
      box-shadow: var(--glass-shadow);
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: "";
      position: absolute;
      top: 0;
      left: -110%;
      width: 46%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.38), transparent);
      transform: skewX(-20deg);
      animation: shimmer 6.2s infinite;
    }

    .hero h1 {
      font-size: clamp(1.5rem, 2.3vw, 2rem);
      font-weight: 800;
      color: var(--primary-dark);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .hero p {
      margin-top: 10px;
      color: var(--text-muted);
      line-height: 1.7;
      max-width: 760px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(360px, 430px) minmax(0, 1fr);
      gap: 20px;
      align-items: start;
    }

    .step + .step {
      margin-top: 22px;
      padding-top: 22px;
      border-top: 1px solid var(--line-soft);
    }

    .step-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .step-badge {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
      color: white;
      font-size: 0.8rem;
      font-weight: 800;
      flex-shrink: 0;
    }

    .step-title {
      font-size: 0.98rem;
      font-weight: 800;
      color: var(--primary-dark);
    }

    .step-copy {
      margin-bottom: 14px;
      color: var(--text-muted);
      font-size: 0.92rem;
      line-height: 1.65;
    }

    .form-grid {
      display: grid;
      gap: 12px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group label {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-muted);
    }

    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid rgba(46, 92, 77, 0.18);
      border-radius: 14px;
      font: inherit;
      color: var(--text-main);
      background: rgba(255, 255, 255, 0.84);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-group input:focus {
      border-color: var(--primary-light);
      box-shadow: 0 0 0 3px rgba(74, 130, 112, 0.12);
    }

    .search-actions {
      display: flex;
      gap: 10px;
      margin-top: 2px;
      flex-wrap: wrap;
    }

    .button {
      border: 0;
      border-radius: 16px;
      min-height: 48px;
      padding: 0 18px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
    }

    .button:hover:not(:disabled) {
      transform: translateY(-1px);
    }

    .button:disabled {
      cursor: default;
      opacity: 0.5;
      box-shadow: none;
    }

    .button.primary {
      color: white;
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
      box-shadow: 0 12px 24px rgba(46, 92, 77, 0.2);
    }

    .button.subtle {
      color: var(--primary-dark);
      background: var(--accent-soft);
    }

    .status {
      min-height: 22px;
      margin-top: 10px;
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--primary-dark);
    }

    .status.error {
      color: #a3422d;
    }

    .results {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .result-card {
      border: 1px solid rgba(46, 92, 77, 0.12);
      border-radius: 18px;
      padding: 10px;
      background: rgba(255, 255, 255, 0.82);
      display: flex;
      flex-direction: column;
      gap: 10px;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
    }

    .result-card:hover {
      transform: translateY(-2px);
      border-color: rgba(74, 130, 112, 0.32);
      box-shadow: 0 12px 26px rgba(18, 38, 30, 0.08);
    }

    .result-card.active {
      border-color: rgba(74, 130, 112, 0.5);
      box-shadow: 0 0 0 3px rgba(74, 130, 112, 0.12);
    }

    .result-thumb {
      width: 100%;
      aspect-ratio: 3 / 4;
      object-fit: cover;
      border-radius: 12px;
      background: #edf3ef;
    }

    .result-title {
      font-size: 0.9rem;
      font-weight: 800;
      line-height: 1.45;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
      overflow: hidden;
    }

    .result-meta {
      font-size: 0.82rem;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .empty-box {
      padding: 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px dashed rgba(46, 92, 77, 0.16);
      color: var(--text-muted);
      font-size: 0.92rem;
      line-height: 1.65;
    }

    .preview-panel {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .preview-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .preview-heading {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .preview-title {
      font-size: 1.02rem;
      font-weight: 800;
      color: var(--primary-dark);
    }

    .preview-copy {
      color: var(--text-muted);
      font-size: 0.92rem;
      line-height: 1.65;
    }

    .canvas-shell {
      border-radius: 28px;
      padding: 18px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.82), rgba(240, 247, 243, 0.92));
      border: 1px solid rgba(46, 92, 77, 0.12);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
    }

    .canvas-frame {
      border-radius: 20px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.66);
      border: 1px solid rgba(46, 92, 77, 0.1);
    }

    canvas {
      width: 100%;
      height: auto;
      display: block;
      aspect-ratio: 16 / 9;
      background: linear-gradient(135deg, #dfe9e3, #c9d8d0);
    }

    .download-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .download-note {
      color: var(--text-muted);
      font-size: 0.9rem;
      line-height: 1.6;
    }

    .copy-lines {
      display: grid;
      gap: 8px;
      margin-top: 2px;
    }

    .copy-line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.58);
      border: 1px solid rgba(46, 92, 77, 0.08);
    }

    .copy-text {
      font-size: 0.9rem;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .copy-button {
      min-height: 34px;
      padding: 0 12px;
      border-radius: 12px;
      font-size: 0.82rem;
      font-weight: 800;
      flex-shrink: 0;
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 720px) {
      .wrap {
        width: min(100vw - 24px, 100%);
        padding: 28px 0 48px;
      }

      .card {
        padding: 22px 18px;
        border-radius: 22px;
      }

      .results {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .preview-top {
        flex-direction: column;
      }

      .selected-book {
        align-items: flex-start;
      }
    }
  </style>
</head>

<body>
  <div class="bg-shape shape-1" aria-hidden="true"></div>
  <div class="bg-shape shape-2" aria-hidden="true"></div>

  <main class="wrap">
    <a class="back-link ani d1" href="../../index.html">← 홈으로 돌아가기</a>

    <section class="card hero ani d1">
      <h1>책 표지 16:9 만들기</h1>
      <p>
        소모임 어플 정모 만들때 업로드 하는 이미지
      </p>
    </section>

    <section class="layout">
      <div class="card ani d2">
        <section class="step">
          <div class="step-header">
            <span class="step-badge">1</span>
            <div class="step-title">책 검색하기</div>
          </div>
          <p class="step-copy">책 제목(필수), 저자(선택)를 입력하여 검색합니다. 또는 직접 이미지를 업로드 합니다.</p>
          <form id="searchForm" class="form-grid">
            <div class="form-group">
              <label for="bookTitle">책 제목</label>
              <input id="bookTitle" type="text" placeholder="예: 먼저 온 미래" required />
            </div>
            <div class="form-group">
              <label for="bookAuthor">저자 (선택)</label>
              <input id="bookAuthor" type="text" placeholder="예: 장강명" />
            </div>
            <div class="search-actions">
              <button id="searchButton" class="button primary" type="submit">알라딘에서 찾기</button>
              <button id="uploadButton" class="button subtle" type="button">직접 이미지 업로드</button>
              <input id="uploadInput" type="file" accept="image/*" hidden />
            </div>
          </form>
          <div id="searchStatus" class="status" aria-live="polite"></div>
        </section>

        <section class="step">
          <div class="step-header">
            <span class="step-badge">2</span>
            <div class="step-title">표지 선택하기</div>
          </div>
          <div id="results" class="results">
            <div class="empty-box">아직 검색 결과가 없습니다. 제목을 입력하고 표지를 찾아보세요.</div>
          </div>
        </section>
      </div>

      <div class="card preview-panel ani d3">
        <div class="preview-top">
          <div class="preview-heading">
            <div class="preview-title">16:9 미리보기</div>
          </div>
          <button id="downloadButton" class="button primary" type="button" disabled>PNG 다운로드</button>
        </div>

        <div class="canvas-shell">
          <div class="canvas-frame">
            <canvas id="previewCanvas" width="1600" height="900" aria-label="책 표지 16대9 미리보기"></canvas>
          </div>
        </div>

        <div class="download-row">
          <p class="download-note">다운로드 파일명은 `책제목_16x9.png`로 저장됩니다.</p>
          <button id="resetButton" class="button subtle" type="button" disabled>선택 해제</button>
        </div>

        <div class="copy-lines">
          <div class="copy-line">
            <span class="copy-text">참석 방법은 게시판의</span>
            <button class="button subtle copy-button" type="button" data-copy-text="참석 방법은 게시판의">복사하기</button>
          </div>
          <div class="copy-line">
            <span class="copy-text">최상단 공지글을 참고해주세요</span>
            <button class="button subtle copy-button" type="button" data-copy-text="최상단 공지글을 참고해주세요">복사하기</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    (function () {
      const FUNCTION_URL = "/.netlify/functions/book-cover-wide";
      const searchForm = document.getElementById("searchForm");
      const bookTitleInput = document.getElementById("bookTitle");
      const bookAuthorInput = document.getElementById("bookAuthor");
      const searchButton = document.getElementById("searchButton");
      const uploadButton = document.getElementById("uploadButton");
      const uploadInput = document.getElementById("uploadInput");
      const searchStatus = document.getElementById("searchStatus");
      const resultsEl = document.getElementById("results");
      const previewCanvas = document.getElementById("previewCanvas");
      const downloadButton = document.getElementById("downloadButton");
      const resetButton = document.getElementById("resetButton");
      const ctx = previewCanvas.getContext("2d", { willReadFrequently: true });

      const state = {
        results: [],
        selectedBook: null,
        selectedImage: null,
        selectedProxyUrl: "",
        uploadedObjectUrl: "",
      };

      function escapeHtml(value) {
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function setStatus(message, isError) {
        searchStatus.textContent = message || "";
        searchStatus.classList.toggle("error", Boolean(isError));
      }

      function buildCoverProxyUrl(url) {
        return `${FUNCTION_URL}?action=cover&url=${encodeURIComponent(url)}`;
      }

      function safeFileName(value) {
        return String(value || "book_cover")
          .replace(/[\\/:*?"<>|]/g, "-")
          .replace(/\s+/g, " ")
          .trim();
      }

      async function copyText(text, button) {
        const originalText = button ? button.textContent : "";
        try {
          await navigator.clipboard.writeText(text);
        } catch (error) {
          const textArea = document.createElement("textarea");
          textArea.value = text;
          document.body.appendChild(textArea);
          textArea.select();
          document.execCommand("copy");
          document.body.removeChild(textArea);
        }

        if (button) {
          button.textContent = "복사됨";
          window.setTimeout(function () {
            button.textContent = originalText;
          }, 1200);
        }
      }

      function loadImage(src) {
        return new Promise((resolve, reject) => {
          const img = new Image();
          img.onload = () => resolve(img);
          img.onerror = () => reject(new Error("표지 이미지를 불러오지 못했습니다."));
          img.src = src;
        });
      }

      function clearUploadedObjectUrl() {
        if (state.uploadedObjectUrl) {
          URL.revokeObjectURL(state.uploadedObjectUrl);
          state.uploadedObjectUrl = "";
        }
      }

      function hexToRgb(hex) {
        const normalized = String(hex || "").replace("#", "");
        if (normalized.length !== 6) {
          return { r: 120, g: 150, b: 140 };
        }

        return {
          r: Number.parseInt(normalized.slice(0, 2), 16),
          g: Number.parseInt(normalized.slice(2, 4), 16),
          b: Number.parseInt(normalized.slice(4, 6), 16),
        };
      }

      function rgbToHex(r, g, b) {
        return `#${[r, g, b]
          .map((value) => Math.max(0, Math.min(255, Math.round(value))).toString(16).padStart(2, "0"))
          .join("")}`;
      }

      function mixColor(a, b, weight) {
        return rgbToHex(
          a.r + (b.r - a.r) * weight,
          a.g + (b.g - a.g) * weight,
          a.b + (b.b - a.b) * weight,
        );
      }

      function tintColor(color, amount, towardWhite) {
        const base = hexToRgb(color);
        const target = towardWhite ? { r: 255, g: 255, b: 255 } : { r: 24, g: 36, b: 32 };
        return mixColor(base, target, amount);
      }

      function sampleAverage(imageData, startX, endX) {
        const { data, width, height } = imageData;
        let totalR = 0;
        let totalG = 0;
        let totalB = 0;
        let count = 0;

        for (let y = 0; y < height; y += 2) {
          for (let x = startX; x < endX; x += 2) {
            const index = (y * width + x) * 4;
            const alpha = data[index + 3];
            if (alpha < 120) {
              continue;
            }
            totalR += data[index];
            totalG += data[index + 1];
            totalB += data[index + 2];
            count += 1;
          }
        }

        if (!count) {
          return "#7a9a90";
        }

        return rgbToHex(totalR / count, totalG / count, totalB / count);
      }

      function sampleAverageRect(imageData, startX, endX, startY, endY) {
        const { data, width } = imageData;
        let totalR = 0;
        let totalG = 0;
        let totalB = 0;
        let count = 0;

        for (let y = startY; y < endY; y += 2) {
          for (let x = startX; x < endX; x += 2) {
            const index = (y * width + x) * 4;
            const alpha = data[index + 3];
            if (alpha < 120) {
              continue;
            }
            totalR += data[index];
            totalG += data[index + 1];
            totalB += data[index + 2];
            count += 1;
          }
        }

        if (!count) {
          return "#7a9a90";
        }

        return rgbToHex(totalR / count, totalG / count, totalB / count);
      }

      function extractPalette(image) {
        const swatchCanvas = document.createElement("canvas");
        const swatchWidth = 64;
        const swatchHeight = Math.max(96, Math.round((image.height / image.width) * swatchWidth));
        swatchCanvas.width = swatchWidth;
        swatchCanvas.height = swatchHeight;
        const swatchCtx = swatchCanvas.getContext("2d", { willReadFrequently: true });
        swatchCtx.drawImage(image, 0, 0, swatchWidth, swatchHeight);
        const imageData = swatchCtx.getImageData(0, 0, swatchWidth, swatchHeight);
        const left = sampleAverage(imageData, 0, Math.max(1, Math.floor(swatchWidth * 0.18)));
        const right = sampleAverage(imageData, Math.max(0, Math.floor(swatchWidth * 0.82)), swatchWidth);
        const middle = sampleAverage(
          imageData,
          Math.max(0, Math.floor(swatchWidth * 0.36)),
          Math.max(1, Math.floor(swatchWidth * 0.64)),
        );
        const sampleStartX = Math.max(0, Math.floor(swatchWidth * 0.18));
        const sampleEndX = Math.max(sampleStartX + 1, Math.floor(swatchWidth * 0.82));
        const top = sampleAverageRect(
          imageData,
          sampleStartX,
          sampleEndX,
          0,
          Math.max(1, Math.floor(swatchHeight * 0.2)),
        );
        const upper = sampleAverageRect(
          imageData,
          sampleStartX,
          sampleEndX,
          Math.max(0, Math.floor(swatchHeight * 0.2)),
          Math.max(1, Math.floor(swatchHeight * 0.45)),
        );
        const lower = sampleAverageRect(
          imageData,
          sampleStartX,
          sampleEndX,
          Math.max(0, Math.floor(swatchHeight * 0.45)),
          Math.max(1, Math.floor(swatchHeight * 0.75)),
        );
        const bottom = sampleAverageRect(
          imageData,
          sampleStartX,
          sampleEndX,
          Math.max(0, Math.floor(swatchHeight * 0.75)),
          swatchHeight,
        );

        return {
          leftBase: left,
          rightBase: right,
          leftOuter: tintColor(left, 0.08, false),
          rightOuter: tintColor(right, 0.08, false),
          verticalStops: [
            { stop: 0, color: tintColor(top, 0.06, false) },
            { stop: 0.28, color: tintColor(upper, 0.04, false) },
            { stop: 0.7, color: tintColor(lower, 0.04, false) },
            { stop: 1, color: tintColor(bottom, 0.06, false) },
          ],
          center: tintColor(middle, 0.08, false),
        };
      }

      function roundRect(context, x, y, width, height, radius) {
        const r = Math.min(radius, width / 2, height / 2);
        context.beginPath();
        context.moveTo(x + r, y);
        context.arcTo(x + width, y, x + width, y + height, r);
        context.arcTo(x + width, y + height, x, y + height, r);
        context.arcTo(x, y + height, x, y, r);
        context.arcTo(x, y, x + width, y, r);
        context.closePath();
      }

      function drawEmptyPreview() {
        const { width, height } = previewCanvas;
        const bg = ctx.createLinearGradient(0, 0, width, height);
        bg.addColorStop(0, "#e6efea");
        bg.addColorStop(1, "#cad9d1");
        ctx.clearRect(0, 0, width, height);
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, width, height);

        ctx.fillStyle = "rgba(255, 255, 255, 0.45)";
        roundRect(ctx, width * 0.33, height * 0.11, width * 0.34, height * 0.78, 28);
        ctx.fill();

        ctx.fillStyle = "rgba(28, 43, 38, 0.68)";
        ctx.textAlign = "center";
        ctx.font = "700 34px Pretendard, sans-serif";
        ctx.fillText("선택한 책 표지가 여기에 보입니다", width / 2, height / 2 - 8);
        ctx.font = "500 22px Pretendard, sans-serif";
        ctx.fillStyle = "rgba(28, 43, 38, 0.48)";
        ctx.fillText("왼쪽에서 책을 고르면 바로 16:9 이미지가 만들어집니다", width / 2, height / 2 + 34);
      }

      function drawPreview() {
        if (!state.selectedImage) {
          drawEmptyPreview();
          return;
        }

        const { width, height } = previewCanvas;
        const image = state.selectedImage;
        const palette = extractPalette(image);

        ctx.clearRect(0, 0, width, height);

        const base = ctx.createLinearGradient(0, 0, width, 0);
        base.addColorStop(0, palette.leftOuter);
        base.addColorStop(0.5, palette.center);
        base.addColorStop(1, palette.rightOuter);
        ctx.fillStyle = base;
        ctx.fillRect(0, 0, width, height);

        const coverScale = height / image.height;
        const drawWidth = image.width * coverScale;
        const drawHeight = height;
        const drawX = (width - drawWidth) / 2;
        const drawY = 0;

        if (drawX > 0) {
          const sideGradient = ctx.createLinearGradient(0, 0, 0, height);
          palette.verticalStops.forEach(function (entry) {
            sideGradient.addColorStop(entry.stop, entry.color);
          });
          ctx.fillStyle = sideGradient;
          ctx.fillRect(0, 0, drawX, height);
          ctx.fillRect(drawX + drawWidth, 0, width - (drawX + drawWidth), height);
        }

        ctx.drawImage(image, drawX, drawY, drawWidth, drawHeight);
      }

      function renderResults() {
        if (!state.results.length) {
          resultsEl.innerHTML = '<div class="empty-box">검색 결과가 없습니다. 제목을 다시 확인하거나 저자를 함께 입력해 보세요.</div>';
          return;
        }

        resultsEl.innerHTML = state.results.map((item, index) => {
          const isActive = state.selectedBook && state.selectedBook.isbn13 === item.isbn13;
          return `
            <article class="result-card ${isActive ? "active" : ""}" data-index="${index}" role="button" tabindex="0">
              <img class="result-thumb" src="${escapeHtml(buildCoverProxyUrl(item.cover))}" alt="${escapeHtml(item.title)} 표지" />
              <div class="result-title">${escapeHtml(item.title)}</div>
              <div class="result-meta">${escapeHtml(item.author || "저자 정보 없음")}</div>
            </article>
          `;
        }).join("");
      }

      function renderSelectedBook() {
        if (!state.selectedBook) {
          downloadButton.disabled = true;
          resetButton.disabled = true;
          return;
        }

        downloadButton.disabled = false;
        resetButton.disabled = false;
      }

      async function chooseBook(index) {
        const item = state.results[index];
        if (!item) {
          return;
        }

        const proxyUrl = buildCoverProxyUrl(item.cover);
        setStatus("표지를 불러오는 중입니다...", false);

        try {
          const image = await loadImage(proxyUrl);
          clearUploadedObjectUrl();
          state.selectedBook = item;
          state.selectedImage = image;
          state.selectedProxyUrl = proxyUrl;
          renderResults();
          renderSelectedBook();
          drawPreview();
          setStatus("표지를 선택했습니다.", false);
        } catch (error) {
          setStatus(String(error.message || error), true);
        }
      }

      async function applyUploadedImage(file) {
        if (!file) {
          return;
        }

        clearUploadedObjectUrl();
        const objectUrl = URL.createObjectURL(file);

        try {
          const image = await loadImage(objectUrl);
          const baseName = file.name ? file.name.replace(/\.[^.]+$/, "") : "uploaded_cover";
          state.selectedBook = {
            title: baseName || "업로드한 표지",
            author: "직접 업로드",
            publisher: "내 기기에서 선택한 이미지",
            isbn13: `upload:${file.name}:${file.size}:${file.lastModified}`,
          };
          state.selectedImage = image;
          state.selectedProxyUrl = objectUrl;
          state.uploadedObjectUrl = objectUrl;
          renderResults();
          renderSelectedBook();
          drawPreview();
          setStatus("업로드한 이미지를 적용했습니다.", false);
        } catch (error) {
          URL.revokeObjectURL(objectUrl);
          setStatus(String(error.message || error), true);
        }
      }

      function resetSelection() {
        clearUploadedObjectUrl();
        state.selectedBook = null;
        state.selectedImage = null;
        state.selectedProxyUrl = "";
        renderResults();
        renderSelectedBook();
        drawPreview();
        setStatus("", false);
      }

      async function searchBooks(title, author) {
        setStatus("알라딘에서 책 표지를 찾는 중입니다...", false);
        searchButton.disabled = true;

        try {
          const response = await fetch(FUNCTION_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              action: "search",
              title,
              author,
            }),
          });

          const data = await response.json().catch(() => ({}));
          if (!response.ok) {
            throw new Error(data.error || `검색에 실패했습니다. (${response.status})`);
          }

          state.results = Array.isArray(data.items) ? data.items : [];
          clearUploadedObjectUrl();
          state.selectedBook = null;
          state.selectedImage = null;
          state.selectedProxyUrl = "";
          renderResults();
          renderSelectedBook();
          drawPreview();

          if (!state.results.length) {
            setStatus("검색 결과가 없습니다. 제목을 다시 확인해 주세요.", true);
          } else {
            setStatus("표지를 선택해 미리보기를 만들어 보세요.", false);
          }
        } catch (error) {
          state.results = [];
          renderResults();
          renderSelectedBook();
          drawPreview();
          setStatus(String(error.message || error), true);
        } finally {
          searchButton.disabled = false;
        }
      }

      function downloadPreview() {
        if (!state.selectedBook) {
          return;
        }

        const anchor = document.createElement("a");
        anchor.href = previewCanvas.toDataURL("image/png");
        anchor.download = `${safeFileName(state.selectedBook.title)}_16x9.png`;
        document.body.appendChild(anchor);
        anchor.click();
        document.body.removeChild(anchor);
      }

      searchForm.addEventListener("submit", function (event) {
        event.preventDefault();
        const title = bookTitleInput.value.trim();
        const author = bookAuthorInput.value.trim();

        if (!title) {
          setStatus("책 제목을 먼저 입력해 주세요.", true);
          bookTitleInput.focus();
          return;
        }

        searchBooks(title, author);
      });

      resultsEl.addEventListener("click", function (event) {
        const card = event.target.closest("[data-index]");
        if (!card) {
          return;
        }
        chooseBook(Number(card.getAttribute("data-index")));
      });

      resultsEl.addEventListener("keydown", function (event) {
        const card = event.target.closest("[data-index]");
        if (!card) {
          return;
        }
        if (event.key !== "Enter" && event.key !== " ") {
          return;
        }
        event.preventDefault();
        chooseBook(Number(card.getAttribute("data-index")));
      });

      document.querySelectorAll("[data-copy-text]").forEach(function (button) {
        button.addEventListener("click", function () {
          copyText(button.getAttribute("data-copy-text") || "", button);
        });
      });

      downloadButton.addEventListener("click", downloadPreview);
      resetButton.addEventListener("click", resetSelection);
      uploadButton.addEventListener("click", function () {
        uploadInput.click();
      });
      uploadInput.addEventListener("change", function (event) {
        const file = event.target.files && event.target.files[0];
        applyUploadedImage(file || null);
        event.target.value = "";
      });

      drawEmptyPreview();
    })();
  </script>
</body>

</html>
