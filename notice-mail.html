<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="assets/favicon/favicon.ico" type="image/x-icon" />
  <link rel="icon" href="assets/favicon/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="assets/favicon/apple-touch-icon.png" />
  <meta name="theme-color" content="#1a3c34" />
  <title>조모임 공지용 메일 쓰기</title>
  <style>
    :root {
      --primary: #2e5c4d;
      --primary-light: #4a8270;
      --primary-dark: #1a3c34;
      --text-main: #1c2b26;
      --text-muted: #5e736a;
      --glass-bg: rgba(255, 255, 255, 0.82);
      --glass-border: rgba(180, 216, 208, 0.56);
      --glass-shadow: 0 20px 48px rgba(31, 94, 85, 0.12);
      --disabled-bg: rgba(230, 235, 232, 0.4);
      --disabled-text: #9eb0a8;
      --title-start: #1f7468;
      --title-mid: #177f86;
      --title-end: #2b85b9;
      --accent-start: #42c48f;
      --accent-mid: #24b5a7;
      --accent-end: #57b7e5;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      color: var(--text-main);
      overflow-x: hidden;
      background:
        radial-gradient(circle at top left, rgba(164, 217, 190, 0.32), transparent 36%),
        radial-gradient(circle at bottom right, rgba(120, 201, 227, 0.24), transparent 32%),
        linear-gradient(135deg, #eef8f4 0%, #eff8f9 52%, #e7f3f7 100%);
      background-attachment: fixed;
    }

    /* Ambient background shapes for premium feel */
    .bg-shape {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      z-index: -1;
      opacity: 0.5;
      animation: float 20s ease-in-out infinite alternate;
    }

    .shape-1 {
      width: 400px;
      height: 400px;
      background: #b6d9c8;
      top: -100px;
      right: -50px;
    }

    .shape-2 {
      width: 500px;
      height: 500px;
      background: #cce0d6;
      bottom: -150px;
      left: -100px;
      animation-delay: -5s;
    }

    @keyframes float {
      0% {
        transform: translate(0, 0) scale(1);
      }

      100% {
        transform: translate(-30px, 40px) scale(1.1);
      }
    }

    .wrap {
      width: min(760px, calc(100vw - 40px));
      margin: 0 auto;
      padding: 28px 0 56px;
      display: grid;
      gap: 20px;
      position: relative;
    }

    /* Micro-interactions: Fade In Up */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-item {
      animation: fadeInUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      opacity: 0;
    }

    .delay-1 {
      animation-delay: 0.1s;
    }

    .delay-2 {
      animation-delay: 0.2s;
    }

    .delay-3 {
      animation-delay: 0.3s;
    }

    .topbar {
      display: flex;
      justify-content: flex-start;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border-radius: 999px;
      text-decoration: none;
      color: var(--primary);
      font-weight: 700;
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(180, 216, 208, 0.56);
      box-shadow: 0 10px 24px rgba(31, 94, 85, 0.08);
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .back-link:hover {
      opacity: 1;
      transform: translateY(-1px);
    }

    .hero {
      display: flex;
      align-items: center;
      gap: 18px;
      background: var(--glass-bg);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid var(--glass-border);
      border-radius: 30px;
      padding: 28px 30px;
      box-shadow: var(--glass-shadow);
      position: relative;
      overflow: hidden;
    }

    .hero-mark {
      position: relative;
      width: 62px;
      height: 62px;
      border-radius: 20px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--accent-start), var(--accent-mid) 54%, var(--accent-end));
      box-shadow: 0 18px 30px rgba(46, 145, 132, 0.22);
    }

    .hero-mark::after {
      content: "";
      position: absolute;
      top: -1px;
      right: -1px;
      width: 16px;
      height: 16px;
      border: 3px solid #fff;
      border-radius: 50%;
      background: linear-gradient(135deg, #5fb8ff, #8ce8ff);
    }

    .hero-mark svg {
      width: 28px;
      height: 28px;
      color: #fff;
      stroke-width: 2.1;
    }

    .hero-copy h1 {
      margin: 0;
      font-size: clamp(1.55rem, 2.8vw, 2.3rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      background: linear-gradient(90deg, var(--title-start), var(--title-mid), var(--title-end));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .hero-copy p {
      margin: 8px 0 0;
      color: var(--text-muted);
      font-weight: 500;
      font-size: 0.98rem;
      line-height: 1.6;
    }

    .panel {
      background: var(--glass-bg);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 14px 34px rgba(92, 121, 126, 0.1);
      display: grid;
      gap: 16px;
      position: relative;
    }

    label {
      color: var(--primary-dark);
      font-size: 0.98rem;
      font-weight: 700;
    }

    input[type="text"],
    textarea {
      width: 100%;
      border: 1px solid rgba(46, 92, 77, 0.2);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 0.96rem;
      background: rgba(255, 255, 255, 0.8);
      color: var(--text-main);
      font-family: inherit;
      resize: vertical;
      transition: all 0.3s ease;
    }

    input[type="text"]:focus,
    textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(46, 92, 77, 0.1);
      background: #ffffff;
    }

    textarea {
      min-height: 100px;
      line-height: 1.5;
    }

    .toggle-group {
      display: grid;
      gap: 10px;
      background: rgba(255, 255, 255, 0.5);
      padding: 16px;
      border-radius: 12px;
      border: 1px solid var(--glass-border);
    }

    .toggle-group label {
      font-weight: 500;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .result-actions {
      display: none;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .result-actions.show {
      display: flex;
      animation: fadeInUp 0.35s ease forwards;
    }

    .result-actions .share-copy {
      background: rgba(255, 255, 255, 0.88);
    }

    .result-actions .share-copy.copied {
      background: #34a853;
      color: #fff;
      border-color: #34a853;
    }

    .result-actions .share-kakao {
      background: #FEE500;
      color: #3C1E1E;
      border-color: #FEE500;
    }

    button {
      border: 1px solid rgba(46, 92, 77, 0.2);
      border-radius: 12px;
      padding: 12px 20px;
      font-weight: 700;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.8);
      color: var(--primary-dark);
      transition: all 0.3s ease;
    }

    button:hover:not(:disabled) {
      background: #ffffff;
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(46, 92, 77, 0.1);
    }

    button.primary {
      background: linear-gradient(90deg, var(--accent-start), var(--accent-mid));
      color: #fff;
      border-color: transparent;
      box-shadow: 0 12px 26px rgba(39, 185, 138, 0.18);
    }

    button.primary:hover:not(:disabled) {
      background: linear-gradient(90deg, var(--accent-mid), var(--title-mid));
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
      background: var(--disabled-bg);
      color: var(--disabled-text);
      border-color: transparent;
    }

    .output {
      white-space: pre-wrap;
      background: rgba(255, 255, 255, 0.85);
      border: 1px solid rgba(46, 92, 77, 0.15);
      border-radius: 12px;
      padding: 16px;
      line-height: 1.6;
      min-height: 180px;
      display: none;
      color: var(--text-main);
      font-size: 0.96rem;
    }

    .output.show {
      display: block;
      animation: fadeInUp 0.5s ease forwards;
    }

    .message {
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 0.95rem;
      font-weight: 500;
      display: none;
      white-space: pre-wrap;
      line-height: 1.45;
    }

    .message.show {
      display: block;
      animation: fadeInUp 0.3s ease forwards;
    }

    .message.error {
      background: #fce8e6;
      color: #b3261e;
      border: 1px solid #f9d0c4;
    }

    .message.ok {
      background: #e6f4ea;
      color: #0d652d;
      border: 1px solid #ceead6;
    }

    .footer {
      color: var(--text-muted);
      font-size: 0.95rem;
      text-align: center;
      margin-top: 20px;
      font-weight: 500;
    }

    @media (max-width: 680px) {
      .wrap {
        width: min(calc(100vw - 20px), 1020px);
        padding: 16px 0 34px;
        gap: 14px;
      }

      .hero {
        flex-direction: row;
        text-align: left;
        align-items: center;
        padding: 20px 18px;
        gap: 16px;
      }

      .panel {
        padding: 20px 16px;
        border-radius: 22px;
      }

      .back-link {
        width: 100%;
        justify-content: center;
      }

      .hero-copy p {
        font-size: 0.92rem;
        margin-top: 6px;
      }
    }
  </style>
</head>

<body>
  <!-- Ambient Background Shapes -->
  <div class="bg-shape shape-1"></div>
  <div class="bg-shape shape-2"></div>

  <main class="wrap">
    <div class="topbar animate-item">
      <a href="index.html" class="back-link">← 홈으로</a>
    </div>

    <section class="hero animate-item">
      <div class="hero-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M6 17h12l-1.4-1.4A2 2 0 0 1 16 14.2V10a4 4 0 1 0-8 0v4.2a2 2 0 0 1-.6 1.4z"
            stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" />
          <path d="M10.2 19a2 2 0 0 0 3.6 0" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </div>
      <div class="hero-copy">
        <h1>정모 조 공지 작성</h1>
        <p>입력한 값으로 공지문을 바로 생성합니다.</p>
      </div>
    </section>

    <section class="panel animate-item delay-1">
      <label for="resultLines">조 배정 결과 입력</label>
      <textarea id="resultLines" rows="3" placeholder="이름을 넣어주세요"></textarea>

      <label>모임 장소</label>
      <div class="toggle-group" role="radiogroup" aria-label="조모임 장소">
        <label><input type="radio" name="venue" value="cafe" /> 카페 와안 2층</label>
        <label><input type="radio" name="venue" value="hollys" /> 할리스 인천대입구역점</label>
        <label>
          <input type="radio" name="venue" value="etc" /> 기타
          <input id="etcVenue" type="text" placeholder="장소 직접 입력"
            style="display:none; margin-left:8px; padding:6px 12px; border-radius:8px; height:32px; font-size:0.9rem; flex:1;" />
        </label>
      </div>

      <label for="bookTitle">책 제목 입력</label>
      <input id="bookTitle" type="text" />

      <label>공지 시점</label>
      <div class="toggle-group" role="radiogroup" aria-label="배포 시점">
        <label><input type="radio" name="releaseTime" value="thu" /> 목요일 (이틀 전)</label>
        <label><input type="radio" name="releaseTime" value="fri" /> 금요일 (하루 전)</label>
      </div>

      <div class="btn-row">
        <button type="button" id="generateBtn" class="primary">확인</button>
      </div>
      <div id="noticeMessage" class="message"></div>
      <pre id="noticeOutput" class="output" aria-live="polite"></pre>
      <div id="resultActions" class="result-actions" aria-live="polite">
        <button type="button" id="copyBtn" class="share-copy">📋 텍스트 복사</button>
        <button type="button" id="shareBtn" class="share-kakao">💬 카카오톡에 공유</button>
      </div>
    </section>
    <p class="footer animate-item delay-2">원하시면 출력 문구 포맷만 수정해 드릴게요.</p>
  </main>

  <script>
    const resultLinesEl = document.getElementById('resultLines');
    const bookTitleEl = document.getElementById('bookTitle');
    const generateBtn = document.getElementById('generateBtn');
    const copyBtn = document.getElementById('copyBtn');
    const shareBtn = document.getElementById('shareBtn');
    const outputEl = document.getElementById('noticeOutput');
    const resultActionsEl = document.getElementById('resultActions');
    const messageEl = document.getElementById('noticeMessage');

    const venueText = {
      cafe: '카페 와안 2층',
      hollys: '할리스 인천대입구역점',
      etc: '기타'
    };

    const timeText = {
      thu: {
        intro: '이번주 토요일',
        close: '토요일에'
      },
      fri: {
        intro: '내일 토요일',
        close: '내일'
      }
    };

    const emojis = ['📙', '📘', '📗', '📕'];

    function shuffle(list) {
      const arr = [...list];
      for (let i = arr.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function showMessage(type, text) {
      messageEl.className = `message show ${type}`;
      messageEl.textContent = text;
    }

    function hideMessage() {
      messageEl.className = 'message';
      messageEl.textContent = '';
    }

    function clampLines() {
      const lines = resultLinesEl.value.replace(/\r/g, '').split('\n');
      if (lines.length <= 5) return;
      resultLinesEl.value = lines.slice(0, 5).join('\n');
    }

    function buildNotice() {
      hideMessage();

      const teams = resultLinesEl.value
        .replace(/\r/g, '')
        .split('\n')
        .map((line) => line.trim())
        .filter((line) => line.length > 0);

      if (teams.length === 0) {
        showMessage('error', '조 배정 결과를 1줄 이상 입력해 주세요.');
        return;
      }

      const book = bookTitleEl.value.trim();
      if (!book) {
        showMessage('error', '책 제목을 입력해 주세요.');
        return;
      }

      const selectedVenue = document.querySelector('input[name="venue"]:checked');
      if (!selectedVenue) {
        showMessage('error', '조모임 장소를 선택해 주세요.');
        return;
      }

      const selectedTime = document.querySelector('input[name="releaseTime"]:checked');
      if (!selectedTime) {
        showMessage('error', '배포 시점을 선택해 주세요.');
        return;
      }

      const teamsClamped = teams.slice(0, 4);
      const emojiList = shuffle(emojis).slice(0, teamsClamped.length);

      const header = timeText[selectedTime.value]?.intro || '내일 토요일';
      const closeWord = timeText[selectedTime.value]?.close || '내일';
      const selectedVenueValue = selectedVenue.value;
      let venue = venueText[selectedVenueValue];

      if (selectedVenueValue === 'etc') {
        const customVenue = document.getElementById('etcVenue').value.trim();
        if (!customVenue) {
          showMessage('error', '기타 장소를 입력해 주세요.');
          return;
        }
        venue = customVenue;
      }

      const teamText = teamsClamped.map((line, index) => `${emojiList[index]} ${line}`).join('\n');
      const lines = [
        '여러분 안녕하세요🤗',
        `${header} <${book}> 정모 조 공지드립니다!`,
        '',
        teamText,
        '',
        `🚗 금주 정모는 ${venue}에서 진행됩니다 🙌🏻 주차는 2시간까지만 무료인 점 참고해주세요!`,
        '🚨주말에도 주차 단속이 있으니, 차량을 가져오시는 분들은 꼭 주변 주차 가능 구역을 확인해 주세요!',
        selectedVenue.value === 'cafe'
          ? '⏰ 오후 2시 50분까지 카페 도착 후 음료 주문 해주세요! (4,500원 이상 메뉴 주문)'
          : '⏰ 오후 2시 50분까지 카페 도착 후 음료 주문 해주세요!',
        '📝 모임 당일 메모지에 책 관련 질문 2~3개를 적어와 주세요!',
        '',
        `그럼 ${closeWord} 뵙겠습니다🥰`
      ].filter((line) => line !== null && line !== undefined).join('\n');

      outputEl.textContent = lines;
      outputEl.classList.add('show');
      resultActionsEl.classList.add('show');
      copyBtn.textContent = '📋 텍스트 복사';
      copyBtn.classList.remove('copied');
      shareBtn.textContent = '💬 카카오톡에 공유';
      shareBtn.style.background = '#FEE500';
      shareBtn.style.color = '#3C1E1E';
      shareBtn.style.borderColor = '#FEE500';
      showMessage('ok', '공지문이 생성됐습니다.');
    }

    async function copyNotice() {
      if (!outputEl.classList.contains('show') || !outputEl.textContent) {
        showMessage('error', '먼저 확인 버튼으로 내용을 생성해 주세요.');
        return;
      }

      try {
        await navigator.clipboard.writeText(outputEl.textContent);
        copyBtn.textContent = '✅ 복사 완료!';
        copyBtn.classList.add('copied');
        showMessage('ok', '공지문을 복사했습니다.');
        setTimeout(() => {
          copyBtn.textContent = '📋 텍스트 복사';
          copyBtn.classList.remove('copied');
        }, 2500);
      } catch (error) {
        showMessage('error', '복사에 실패했습니다. 브라우저 권한을 확인해 주세요.');
      }
    }

    async function shareNotice() {
      if (!outputEl.classList.contains('show') || !outputEl.textContent) {
        showMessage('error', '먼저 확인 버튼으로 내용을 생성해 주세요.');
        return;
      }

      const text = outputEl.textContent;

      if (navigator.share) {
        try {
          await navigator.share({ text });
        } catch (error) {
          // 사용자가 공유를 취소한 경우 별도 처리하지 않음
        }
        return;
      }

      try {
        await navigator.clipboard.writeText(text);
      } catch (error) {
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      }

      shareBtn.textContent = '✅ 복사 완료! 카카오톡에 붙여넣으세요';
      shareBtn.style.background = '#34a853';
      shareBtn.style.color = '#fff';
      shareBtn.style.borderColor = '#34a853';
      showMessage('ok', '카카오톡 공유용 텍스트를 복사했습니다.');
      setTimeout(() => {
        shareBtn.textContent = '💬 카카오톡에 공유';
        shareBtn.style.background = '#FEE500';
        shareBtn.style.color = '#3C1E1E';
        shareBtn.style.borderColor = '#FEE500';
      }, 3000);
    }

    // 기타 장소 입력창 토글 제어
    document.querySelectorAll('input[name="venue"]').forEach(radio => {
      radio.addEventListener('change', (e) => {
        const etcVenueInput = document.getElementById('etcVenue');
        if (e.target.value === 'etc') {
          etcVenueInput.style.display = 'inline-block';
          etcVenueInput.focus();
        } else {
          etcVenueInput.style.display = 'none';
        }
      });
    });

    resultLinesEl.addEventListener('input', clampLines);
    generateBtn.addEventListener('click', buildNotice);
    copyBtn.addEventListener('click', copyNotice);
    shareBtn.addEventListener('click', shareNotice);
  </script>
</body>

</html>
